<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波导色散 — 光子学工具箱</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
.mode-tabs { display:flex; gap:4px; margin-bottom:16px; }
.mode-tab { flex:1; padding:10px; text-align:center; background:#1e293b; color:#94a3b8;
    border:none; border-radius:8px; cursor:pointer; font-size:15px; transition:all 0.2s; }
.mode-tab.active { background:#3b82f6; color:#fff; font-weight:600; }
.mode-tab:hover:not(.active) { background:#334155; color:#e2e8f0; }
.input-group { margin-bottom:14px; }
.input-group label { display:flex; justify-content:space-between; align-items:center;
    color:#cbd5e1; font-size:13px; margin-bottom:4px; }
.input-group label span { color:#64748b; font-size:12px; }
.input-group input[type=range] { width:100%; accent-color:#3b82f6; }
.input-group input[type=number] { width:100%; padding:8px 12px; background:#1e293b;
    border:1px solid #334155; border-radius:6px; color:#e2e8f0; font-size:14px; }
.results-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
.result-card { background:#1e293b; padding:14px; border-radius:8px; text-align:center;
    border:1px solid #334155; }
.result-card .name { color:#64748b; font-size:11px; margin-bottom:4px; }
.result-card .value { color:#e2e8f0; font-size:20px; font-weight:700; font-family:monospace; }
.result-card .unit { color:#64748b; font-size:11px; }
.chart-container { background:#0f172a; border-radius:8px; padding:16px;
    border:1px solid #334155; position:relative; min-height:320px; }
.chart-container canvas { width:100% !important; height:300px !important; }
#surfaceCanvas { width:100% !important; height:400px !important; }
.info-bar { display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px; font-size:12px; color:#64748b; }
.info-bar strong { color:#e2e8f0; }
.panel { display:none; }
.panel.active { display:block; }
.range-labels { display:flex; justify-content:space-between; font-size:10px; color:#475569; }
.warning { background:#422006; color:#fbbf24; padding:10px 14px; border-radius:6px;
    font-size:12px; margin-bottom:12px; display:none; }
.footer-note { text-align:center; color:#475569; font-size:12px; margin-top:12px; }
</style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <h1>波导色散 <span style="font-weight:300;color:#64748b;">— 光子学工具箱</span></h1>
    <p>Si₃N₄ 脊形波导 · phys-4 物理模型 · 双维度查询</p>
    <a href="../index.html" class="back-link">← 返回工具列表</a>
  </header>

  <!-- 模式切换 -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="point" id="tabPoint">◆ 点</button>
    <button class="mode-tab" data-mode="line" id="tabLine">〰 线</button>
    <button class="mode-tab" data-mode="surface" id="tabSurface">▣ 面</button>
  </div>

  <div class="warning" id="wgWarning">输入超出推荐范围，结果为模型外推，精度有限。</div>

  <!-- 输入控件 -->
  <div class="card">
    <div class="card-title">波导参数</div>
    <div class="input-group">
      <label>波导宽度 <span id="wgWidthLabel">1.500000 μm</span></label>
      <input type="range" id="wgWidthSlider" min="0.8" max="7.0" step="0.01" value="1.5">
      <div class="range-labels"><span>0.8</span><span>1.5</span><span>2.5</span><span>4.0</span><span>5.5</span><span>7.0</span></div>
    </div>
    <div class="input-group" id="lambdaGroup">
      <label>波长 <span id="wgLambdaLabel">1550 nm</span></label>
      <input type="range" id="wgLambdaSlider" min="1300" max="1800" step="1" value="1550">
      <div class="range-labels"><span>1300</span><span>1400</span><span>1500</span><span>1550</span><span>1600</span><span>1700</span><span>1800 nm</span></div>
    </div>
  </div>

  <!-- 点模式: 结果卡片 -->
  <div class="panel active" id="panelPoint">
    <div class="results-grid">
      <div class="result-card"><div class="name">色散 β₂</div><div class="value" id="wgBeta2">—</div><div class="unit">ps²/km</div></div>
      <div class="result-card"><div class="name">模场面积 Aeff</div><div class="value" id="wgAeff">—</div><div class="unit">×10⁻¹² m²</div></div>
      <div class="result-card"><div class="name">群折射率 ng</div><div class="value" id="wgNg">—</div><div class="unit"></div></div>
      <div class="result-card"><div class="name">有效折射率 neff</div><div class="value" id="wgNeff">—</div><div class="unit"></div></div>
    </div>
  </div>

  <!-- 线模式 -->
  <div class="panel" id="panelLine">
    <div class="chart-container"><canvas id="lineChart"></canvas></div>
  </div>

  <!-- 面模式 -->
  <div class="panel" id="panelSurface">
    <div class="chart-container"><canvas id="surfaceCanvas"></canvas></div>
  </div>

  <div class="footer-note">phys-4 模型: neff(w,f) = A + Bf + Cf² + Df³ + E/w + F/w² + G/w³ + Hf/w + If²/w + Jf/w² &nbsp;|&nbsp; R²=0.999926</div>
</div>
<script src="waveguide.js"></script>
<script>
// ===== UI 控制器 =====
const EL = {
    mode:     'wgMode',
    wSlider:  document.getElementById('wgWidthSlider'),
    wLabel:   document.getElementById('wgWidthLabel'),
    lSlider:  document.getElementById('wgLambdaSlider'),
    lLabel:   document.getElementById('wgLambdaLabel'),
    beta2:    document.getElementById('wgBeta2'),
    aeff:     document.getElementById('wgAeff'),
    ng:       document.getElementById('wgNg'),
    neff:     document.getElementById('wgNeff'),
    warning:  document.getElementById('wgWarning'),
    tabs:     document.querySelectorAll('.mode-tab'),
    panels:   document.querySelectorAll('.panel')
};

let currentMode = 'point';
let lineChart = null;

// 模式切换
EL.tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        currentMode = tab.dataset.mode;
        EL.tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        EL.panels.forEach(p => p.classList.remove('active'));
        document.getElementById('panel' + currentMode.charAt(0).toUpperCase() + currentMode.slice(1)).classList.add('active');
        updateAll();
    });
});

// 输入同步
function getWidth() { return parseFloat(EL.wSlider.value); }
function getLambda() { return parseInt(EL.lSlider.value); }

EL.wSlider.addEventListener('input', () => {
    EL.wLabel.textContent = getWidth().toFixed(6) + ' μm';
    updateAll();
});
EL.lSlider.addEventListener('input', () => {
    EL.lLabel.textContent = getLambda() + ' nm';
    updateAll();
});

function updateAll() {
    const w = getWidth(), lam = getLambda();
    EL.wLabel.textContent = w.toFixed(6) + ' μm';
    EL.lLabel.textContent = lam + ' nm';

    const r = computeAll(w, lam);

    // 点模式
    EL.beta2.textContent = r.beta2.toFixed(6);
    EL.aeff.textContent  = r.aeff.toFixed(6);
    EL.ng.textContent    = r.ng.toFixed(6);
    EL.neff.textContent  = r.neff.toFixed(6);

    // 线模式
    if (currentMode === 'line') drawLine(w);
    // 面模式
    if (currentMode === 'surface') drawSurface();
}

// ===== 线模式: neff vs 波长 =====
function drawLine(w) {
    const lamArr = []; for (let l=1300; l<=1800; l+=1) lamArr.push(l);
    const neffArr = neffSpectrum(w, lamArr);
    const lam1550 = lamArr.indexOf(1550);

    const ctx = document.getElementById('lineChart').getContext('2d');
    if (lineChart) lineChart.destroy();

    lineChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: lamArr,
            datasets: [{
                label: 'neff (w='+w.toFixed(2)+' μm)',
                data: neffArr, borderColor: '#3b82f6', borderWidth: 2.5,
                pointRadius: 0, tension: 0.1, fill: false
            },{
                label: '1550 nm (neff='+neffArr[lam1550].toFixed(6)+')',
                data: lamArr.map((_,i) => i===lam1550 ? neffArr[lam1550] : null),
                borderColor: '#ef4444', borderWidth: 0,
                pointRadius: 8, pointBackgroundColor: '#ef4444', pointStyle: 'rectRot',
                showLine: false
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
                tooltip: { callbacks: { label: ctx => 'neff = '+ctx.parsed.y.toFixed(6) } }
            },
            scales: {
                x: { title: { display: true, text: '波长 (nm)', color: '#94a3b8' },
                     ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                y: { title: { display: true, text: 'Re(neff)', color: '#94a3b8' },
                     ticks: { color: '#64748b', callback: v=>v.toFixed(6) }, grid: { color: '#1e293b' } }
            }
        }
    });
}

// ===== 面模式: 2D 伪彩图 =====
function drawSurface() {
    const canvas = document.getElementById('surfaceCanvas');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const W = rect.width - 32, H = 400;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad = { top: 10, right: 20, bottom: 45, left: 65 };
    const pw = W - pad.left - pad.right, ph = H - pad.top - pad.bottom;

    // 网格: 宽度 0.8-3.0μm (30点), 波长 1300-1800nm (51点)
    const wGrid = []; for (let i=0; i<35; i++) wGrid.push(0.8 + i*(2.2/34));
    const lamGrid = []; for (let i=0; i<51; i++) lamGrid.push(1300 + i*10);
    const grid = neffGrid(wGrid, lamGrid);

    // min/max
    let vmin = Infinity, vmax = -Infinity;
    for (let i=0; i<grid.length; i++)
        for (let j=0; j<grid[0].length; j++) {
            if (grid[i][j] < vmin) vmin = grid[i][j];
            if (grid[i][j] > vmax) vmax = grid[i][j];
        }

    // 绘制伪彩
    const dx = pw / lamGrid.length, dy = ph / wGrid.length;
    for (let i = 0; i < wGrid.length; i++) {
        for (let j = 0; j < lamGrid.length; j++) {
            const t = (grid[i][j] - vmin) / (vmax - vmin);
            ctx.fillStyle = jetColor(t);
            ctx.fillRect(pad.left + j*dx, pad.top + i*dy, dx+1, dy+1);
        }
    }

    // 坐标轴
    ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top+ph);
    ctx.lineTo(pad.left+pw, pad.top+ph); ctx.stroke();

    ctx.fillStyle = '#94a3b8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    for (let lam=1300; lam<=1800; lam+=100) {
        const x = pad.left + (lam-1300)/500*pw;
        ctx.fillText(lam, x, pad.top+ph+16);
    }
    ctx.fillText('波长 (nm)', pad.left+pw/2, pad.top+ph+35);

    ctx.textAlign = 'right';
    for (let w=1.0; w<=3.0; w+=0.5) {
        const y = pad.top + (w-0.8)/2.2*ph;
        ctx.fillText(w.toFixed(1), pad.left-8, y+4);
    }
    ctx.save(); ctx.translate(14, pad.top+ph/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign = 'center'; ctx.fillText('宽度 (μm)', 0, 0); ctx.restore();

    // colorbar
    const cbX = pad.left + pw + 8, cbW = 14, cbH = ph;
    for (let k = 0; k < cbH; k++) {
        ctx.fillStyle = jetColor(1 - k/cbH);
        ctx.fillRect(cbX, pad.top + k, cbW, 1);
    }
    ctx.strokeStyle = '#64748b'; ctx.strokeRect(cbX, pad.top, cbW, cbH);
    ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'left'; ctx.font = '10px sans-serif';
    ctx.fillText(vmax.toFixed(6), cbX+cbW+4, pad.top+10);
    ctx.fillText(vmin.toFixed(6), cbX+cbW+4, pad.top+ph);
    ctx.fillText('neff', cbX+cbW+4, pad.top+ph/2+4);
}

// jet colormap
function jetColor(t) {
    t = Math.max(0, Math.min(1, t));
    let r, g, b;
    if (t < 0.125) { r=0; g=0; b=0.5+t*4; }
    else if (t < 0.375) { r=0; g=(t-0.125)*4; b=1; }
    else if (t < 0.625) { r=(t-0.375)*4; g=1; b=1-(t-0.375)*4; }
    else if (t < 0.875) { r=1; g=1-(t-0.625)*4; b=0; }
    else { r=1-(t-0.875)*4; g=0; b=0; }
    return 'rgb('+Math.round(r*255)+','+Math.round(g*255)+','+Math.round(b*255)+')';
}

// 初始化
updateAll();
</script>
</body>
</html>
